<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>가족 가계부</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap');

    * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }

    body {
      font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #F5F6F8;
      overscroll-behavior: none;
    }

    .app-wrap {
      max-width: 430px;
      margin: 0 auto;
      min-height: 100dvh;
      background: #F5F6F8;
      overflow-x: hidden;
    }

    /* ── Tab System ─────────────────────────────── */
    .tab-content { display: none; padding-bottom: 88px; }
    .tab-content.active { display: block; }

    /* ── Bottom Nav ─────────────────────────────── */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      max-width: 430px;
      width: 100%;
      background: #fff;
      border-top: 1px solid #E5E8EB;
      display: flex;
      align-items: flex-end;
      z-index: 100;
      padding-bottom: env(safe-area-inset-bottom, 8px);
    }
    .nav-btn {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 10px 0 4px;
      font-size: 10px;
      font-weight: 600;
      color: #B0B8C1;
      border: none;
      background: none;
      cursor: pointer;
      transition: color 0.15s;
      gap: 3px;
    }
    .nav-btn.active { color: #0064FF; }
    .nav-btn .nav-icon { font-size: 20px; line-height: 1; }
    .nav-add-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 0 4px;
      gap: 3px;
      cursor: pointer;
      border: none;
      background: none;
    }
    .nav-add-circle {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      background: #0064FF;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      color: white;
      margin-top: -16px;
      box-shadow: 0 4px 16px rgba(0,100,255,0.45);
      transition: transform 0.15s, background 0.15s;
    }
    .nav-add-circle:active { transform: scale(0.92); }
    .nav-add-label { font-size: 10px; font-weight: 600; color: #B0B8C1; }

    /* ── Cards ──────────────────────────────────── */
    .card {
      background: white;
      border-radius: 20px;
      box-shadow: 0 1px 6px rgba(0,0,0,0.06);
      overflow: hidden;
    }

    /* ── Amount typography ──────────────────────── */
    .amount-hero { font-size: 36px; font-weight: 900; letter-spacing: -1.5px; color: #191F28; }
    .amount-lg   { font-size: 22px; font-weight: 800; letter-spacing: -1px; }
    .amount-md   { font-size: 15px; font-weight: 700; letter-spacing: -0.5px; }

    /* ── Category Icon ──────────────────────────── */
    .cat-icon {
      width: 42px; height: 42px;
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; flex-shrink: 0;
    }
    .cat-icon-sm {
      width: 30px; height: 30px;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; flex-shrink: 0;
    }

    /* ── Settlement badges ──────────────────────── */
    .badge {
      display: inline-block;
      font-size: 10px; font-weight: 700;
      padding: 2px 7px;
      border-radius: 20px;
      white-space: nowrap;
    }
    .badge-red    { background: #FFF0F0; color: #E53E3E; }
    .badge-blue   { background: #EBF4FF; color: #0064FF; }
    .badge-gray   { background: #F5F6F8; color: #8B95A1; }
    .badge-orange { background: #FFF5E6; color: #E37400; }

    /* ── Form inputs ────────────────────────────── */
    .form-input {
      width: 100%;
      border: 1.5px solid #E5E8EB;
      border-radius: 12px;
      padding: 13px 14px;
      font-size: 15px;
      font-family: inherit;
      background: white;
      color: #191F28;
      transition: border-color 0.2s, box-shadow 0.2s;
      -webkit-appearance: none;
    }
    .form-input:focus {
      outline: none;
      border-color: #0064FF;
      box-shadow: 0 0 0 3px rgba(0,100,255,0.1);
    }
    .form-label {
      display: block;
      font-size: 12px;
      font-weight: 700;
      color: #8B95A1;
      margin-bottom: 6px;
      letter-spacing: 0.2px;
    }

    /* ── Buttons ────────────────────────────────── */
    .btn-primary {
      width: 100%; background: #0064FF; color: white;
      font-size: 16px; font-weight: 700; padding: 17px;
      border-radius: 14px; border: none; cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      font-family: inherit; letter-spacing: -0.3px;
    }
    .btn-primary:active { background: #0052D9; transform: scale(0.98); }
    .btn-primary:disabled { background: #C2D4FF; cursor: not-allowed; transform: none; }
    .btn-edit {
      width: 100%; background: #FF8A00; color: white;
      font-size: 16px; font-weight: 700; padding: 17px;
      border-radius: 14px; border: none; cursor: pointer;
      font-family: inherit;
    }

    /* ── Month pill ─────────────────────────────── */
    .month-pill {
      position: relative;
      display: inline-flex; align-items: center; gap: 5px;
      background: #EBF4FF; color: #0064FF;
      padding: 7px 13px; border-radius: 20px;
      font-size: 13px; font-weight: 700;
      cursor: pointer; border: none;
      white-space: nowrap;
    }
    .month-pill input[type="month"] {
      position: absolute; inset: 0;
      opacity: 0; cursor: pointer; width: 100%;
    }

    /* ── Filter chips ────────────────────────────── */
    .chips-row {
      display: flex; gap: 8px; overflow-x: auto;
      padding: 2px 0; scrollbar-width: none;
    }
    .chips-row::-webkit-scrollbar { display: none; }
    .chip {
      flex-shrink: 0;
      display: inline-flex; align-items: center;
      padding: 6px 13px; border-radius: 20px;
      font-size: 12px; font-weight: 600;
      border: 1.5px solid #E5E8EB;
      background: white; color: #8B95A1;
      cursor: pointer; white-space: nowrap;
      transition: all 0.15s;
      -webkit-appearance: none; font-family: inherit;
    }
    .chip.active, .chip:focus {
      background: #EBF4FF; border-color: #0064FF; color: #0064FF;
      outline: none;
    }

    /* ── Record card ────────────────────────────── */
    .record-card {
      background: white;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,0.05);
    }
    .record-row {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 16px; cursor: pointer;
    }
    .record-row:active { background: #F9FAFC; }
    .record-actions {
      max-height: 0; overflow: hidden;
      transition: max-height 0.25s ease;
    }
    .record-actions.open { max-height: 60px; }
    .record-actions-inner {
      display: flex; gap: 8px;
      padding: 0 12px 12px;
    }

    /* ── Date group header ──────────────────────── */
    .date-header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 4px 4px 8px;
    }

    /* ── Skeleton ───────────────────────────────── */
    @keyframes shimmer {
      0%   { background-position: -600px 0; }
      100% { background-position: 600px 0; }
    }
    .skeleton {
      background: linear-gradient(90deg, #F0F0F0 25%, #E4E4E4 50%, #F0F0F0 75%);
      background-size: 600px 100%;
      animation: shimmer 1.3s infinite;
      border-radius: 12px;
    }

    /* ── Progress bar ───────────────────────────── */
    .prog-bar { height: 5px; background: #F0F0F0; border-radius: 99px; overflow: hidden; }
    .prog-fill { height: 100%; border-radius: 99px; transition: width 0.6s ease; }

    /* ── Scrollbar ──────────────────────────────── */
    ::-webkit-scrollbar { width: 0; }
  </style>
</head>

<body>
<div class="app-wrap">

  <!-- ════════════════════════════════════════
       STICKY HEADER
  ════════════════════════════════════════ -->
  <header style="background:white; position:sticky; top:0; z-index:40; padding: 16px 20px 12px; border-bottom: 1px solid #F0F0F0;">
    <div class="flex justify-between items-center">
      <div>
        <p style="font-size:11px; color:#8B95A1; font-weight:500;" id="todayDateDisplay">로딩중...</p>
        <h1 style="font-size:18px; font-weight:800; color:#191F28; margin-top:1px;">🏠 가족 가계부</h1>
      </div>
      <label class="month-pill">
        <span>📅</span>
        <span id="monthLabel">이번 달</span>
        <span style="font-size:10px; opacity:0.7;">▾</span>
        <input type="month" id="monthSelector" onchange="onMonthChange()">
      </label>
    </div>
  </header>


  <!-- ════════════════════════════════════════
       TAB: HOME
  ════════════════════════════════════════ -->
  <div id="tab-home" class="tab-content active" style="padding: 16px 16px 88px;">

    <!-- Hero Summary Card -->
    <div class="card mb-3" style="padding: 22px 20px 18px;">
      <p style="font-size:12px; font-weight:600; color:#8B95A1; margin-bottom:6px;" id="expenseLabel">이번 달 순수 지출</p>
      <p class="amount-hero" id="totalExpense">₩0</p>

      <div style="height:1px; background:#F5F6F8; margin: 18px 0;"></div>

      <div class="flex items-center justify-between">
        <div>
          <p style="font-size:11px; color:#8B95A1; font-weight:500; margin-bottom:4px;">🔥 전체 미정산 (누적)</p>
          <p class="amount-lg" style="color:#E53E3E;" id="pendingAmount">₩0</p>
        </div>
        <button onclick="switchTab('list'); setChipFilter('pending')"
          style="font-size:12px; font-weight:700; color:#0064FF; background:#EBF4FF; border:none; padding:8px 14px; border-radius:20px; cursor:pointer;">
          미정산 보기 →
        </button>
      </div>
    </div>

    <!-- Weekly Chart -->
    <div class="card mb-3" style="padding: 18px 20px;">
      <p style="font-size:12px; font-weight:700; color:#8B95A1; margin-bottom:14px;" id="chartLabel">이번 달 주차별 지출</p>
      <div style="position:relative; height:150px;"><canvas id="weeklyChart"></canvas></div>
    </div>

    <!-- Category Breakdown -->
    <div class="card mb-3" style="padding: 18px 20px;">
      <div class="flex justify-between items-center" style="margin-bottom:14px;">
        <p style="font-size:12px; font-weight:700; color:#8B95A1;">카테고리별 지출</p>
        <button onclick="switchTab('list')" style="font-size:11px; font-weight:600; color:#0064FF; background:none; border:none; cursor:pointer;">전체 내역 →</button>
      </div>
      <div id="catBreakdown" style="display:flex; flex-direction:column; gap:12px;">
        <div class="skeleton" style="height:32px;"></div>
        <div class="skeleton" style="height:32px;"></div>
        <div class="skeleton" style="height:32px; width:80%;"></div>
      </div>
    </div>

    <!-- Quick Add -->
    <button class="btn-primary" onclick="switchTab('add')">+ 지출 기록하기</button>

  </div>


  <!-- ════════════════════════════════════════
       TAB: ADD
  ════════════════════════════════════════ -->
  <div id="tab-add" class="tab-content" style="padding: 16px 16px 88px;">

    <div class="flex justify-between items-center" style="margin-bottom:20px;">
      <h2 style="font-size:18px; font-weight:800; color:#191F28;" id="formTitle">새 지출 기록</h2>
      <button id="cancelEditBtn" class="hidden"
        style="font-size:12px; font-weight:700; color:#FF8A00; background:#FFF5E6; border:none; padding:7px 13px; border-radius:20px; cursor:pointer;"
        onclick="cancelEdit()">✕ 취소</button>
    </div>

    <form id="recordForm" style="display:flex; flex-direction:column; gap:12px;">
      <input type="hidden" id="editId" value="">

      <!-- 날짜 & 금액 -->
      <div class="card" style="padding:18px;">
        <div style="margin-bottom:14px;">
          <label class="form-label">📅 날짜</label>
          <input type="date" id="date" required class="form-input">
        </div>
        <div>
          <label class="form-label">💵 금액</label>
          <div style="position:relative;">
            <span style="position:absolute; left:14px; top:50%; transform:translateY(-50%); color:#8B95A1; font-weight:700; font-size:16px;">₩</span>
            <input type="number" id="amount" required placeholder="0" class="form-input"
              style="padding-left:32px; text-align:right; font-size:18px; font-weight:800;"
              inputmode="numeric">
          </div>
        </div>
      </div>

      <!-- 분류 & 카테고리 -->
      <div class="card" style="padding:18px;">
        <div style="margin-bottom:14px;">
          <label class="form-label">👤 분류</label>
          <select id="class" required class="form-input" onchange="onClassChange()">
            <option value="">불러오는 중...</option>
          </select>
        </div>
        <div>
          <label class="form-label">🏷️ 카테고리</label>
          <select id="category" required class="form-input">
            <option value="">불러오는 중...</option>
          </select>
        </div>
      </div>

      <!-- 세부 & 항목 -->
      <div class="card" style="padding:18px;">
        <div style="margin-bottom:14px;">
          <label class="form-label">📍 어디서?</label>
          <select id="subCategory" class="form-input">
            <option value="">불러오는 중...</option>
          </select>
        </div>
        <div>
          <label class="form-label">🛒 무엇을?</label>
          <input type="text" id="item" placeholder="예: 감자, 닭다리살" class="form-input">
        </div>
      </div>

      <!-- 정산 상태 -->
      <div class="card" style="padding:18px;">
        <div>
          <label class="form-label">💳 정산 상태</label>
          <select id="settlement" class="form-input">
            <option value="">불러오는 중...</option>
          </select>
        </div>
      </div>

      <button type="submit" id="submitBtn" class="btn-primary">저장하기</button>
    </form>
  </div>


  <!-- ════════════════════════════════════════
       TAB: LIST
  ════════════════════════════════════════ -->
  <div id="tab-list" class="tab-content" style="padding: 16px 16px 88px;">

    <!-- Header row -->
    <div class="flex justify-between items-center" style="margin-bottom:12px;">
      <h2 style="font-size:16px; font-weight:800; color:#191F28;">지출 내역</h2>
      <div class="flex" style="gap:8px;">
        <select id="sortSelector" onchange="applyFilters()" class="chip" style="cursor:pointer;">
          <option value="dateDesc">최신순</option>
          <option value="dateAsc">날짜순</option>
          <option value="amountDesc">금액↓</option>
          <option value="amountAsc">금액↑</option>
        </select>
        <button onclick="loadData()" class="chip">🔄</button>
      </div>
    </div>

    <!-- Filter chips -->
    <div class="chips-row" style="margin-bottom:14px;">
      <button class="chip active" id="chip-all" onclick="setChipFilter('all')">전체</button>
      <button class="chip" id="chip-pending" onclick="setChipFilter('pending')">🔥 미정산</button>
      <select id="filterClass" onchange="applyFilters()" class="chip">
        <option value="">👤 분류</option>
      </select>
      <select id="filterCategory" onchange="applyFilters()" class="chip">
        <option value="">🏷️ 카테고리</option>
      </select>
      <select id="filterSubCategory" onchange="applyFilters()" class="chip">
        <option value="">📍 구매처</option>
      </select>
      <select id="filterSettlement" onchange="applyFilters()" class="chip">
        <option value="">💳 정산</option>
      </select>
      <button class="chip" onclick="resetFilters()" style="color:#E53E3E; border-color:#FFD5D2;">초기화</button>
    </div>

    <!-- Hidden filters -->
    <input type="date" id="filterDate" onchange="applyFilters()" class="hidden">
    <select id="filterClosed" onchange="applyFilters()" class="hidden"><option value=""></option></select>

    <!-- Loading skeletons -->
    <div id="loading" style="display:flex; flex-direction:column; gap:8px;">
      <div class="skeleton" style="height:76px; border-radius:16px;"></div>
      <div class="skeleton" style="height:76px; border-radius:16px;"></div>
      <div class="skeleton" style="height:76px; border-radius:16px;"></div>
    </div>
    <div id="recordList" style="display:flex; flex-direction:column; gap:0;"></div>

  </div>


  <!-- ════════════════════════════════════════
       TAB: ANALYSIS
  ════════════════════════════════════════ -->
  <div id="tab-analysis" class="tab-content" style="padding:16px 16px 88px;">

    <!-- 분석 시트 업데이트 버튼 -->
    <button id="updateAnalysisBtn" onclick="triggerAnalysisUpdate()"
      style="width:100%; padding:12px; border-radius:14px; border:none; cursor:pointer;
             background:#0064FF; color:white; font-size:14px; font-weight:700;
             display:flex; align-items:center; justify-content:center; gap:8px;
             margin-bottom:14px; box-shadow:0 2px 10px rgba(0,100,255,0.25);
             transition:opacity 0.15s;">
      <span id="updateAnalysisBtnIcon">📊</span>
      <span id="updateAnalysisBtnText">스프레드시트 분석 업데이트</span>
    </button>

    <!-- 범위 토글 -->
    <div style="display:flex; gap:8px; margin-bottom:14px;">
      <button id="scope-all" onclick="setAnalysisScope('all')"
        style="flex:1; padding:10px; border-radius:12px; font-size:13px; font-weight:700;
               border:none; cursor:pointer; background:#0064FF; color:white; transition:all 0.15s;">전체 기간</button>
      <button id="scope-month" onclick="setAnalysisScope('month')"
        style="flex:1; padding:10px; border-radius:12px; font-size:13px; font-weight:700;
               border:none; cursor:pointer; background:#F5F6F8; color:#8B95A1; transition:all 0.15s;" id="scope-month">이번 달</button>
    </div>

    <!-- 섹션 칩 -->
    <div class="chips-row" style="margin-bottom:16px;">
      <button class="chip active asec-chip" id="chip-asec-monthly"  onclick="switchAnalysisSection('monthly')">📅 월별</button>
      <button class="chip asec-chip"        id="chip-asec-category" onclick="switchAnalysisSection('category')">🏷️ 카테고리</button>
      <button class="chip asec-chip"        id="chip-asec-class"    onclick="switchAnalysisSection('class')">👤 분류</button>
      <button class="chip asec-chip"        id="chip-asec-sub"      onclick="switchAnalysisSection('sub')">📍 구매처</button>
      <button class="chip asec-chip"        id="chip-asec-top"      onclick="switchAnalysisSection('top')">🏆 TOP10</button>
    </div>

    <!-- ── 섹션: 월별 ── -->
    <div id="asec-monthly" class="asec">
      <div class="card" style="padding:18px 20px; margin-bottom:10px;">
        <p style="font-size:12px; font-weight:700; color:#8B95A1; margin-bottom:14px;">월별 순수 지출 추이</p>
        <div style="position:relative; height:180px;"><canvas id="monthlyAnalysisChart"></canvas></div>
      </div>
      <div class="card" style="padding:18px 20px; margin-bottom:10px;">
        <p style="font-size:12px; font-weight:700; color:#8B95A1; margin-bottom:10px;">월별 상세</p>
        <div id="monthly-analysis-table"></div>
      </div>
      <!-- 예산 vs 실제 카드 -->
      <div class="card" style="padding:18px 20px;">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
          <p style="font-size:12px; font-weight:700; color:#8B95A1;">🎯 예산 vs 실제</p>
          <button onclick="toggleBudgetEdit()" id="budgetEditBtn"
            style="font-size:11px; font-weight:700; color:#0064FF; background:#EBF4FF;
                   border:none; padding:5px 10px; border-radius:20px; cursor:pointer; font-family:inherit;">✏️ 수정</button>
        </div>
        <div id="budget-table"></div>
        <div id="budget-edit-panel" style="display:none; margin-top:12px; border-top:1px solid #F5F6F8; padding-top:14px;"></div>
      </div>
    </div>

    <!-- ── 섹션: 카테고리 ── -->
    <div id="asec-category" class="asec" style="display:none;">
      <div class="card" style="padding:18px 20px; margin-bottom:10px;">
        <p style="font-size:12px; font-weight:700; color:#8B95A1; margin-bottom:14px;">카테고리 비율</p>
        <div style="position:relative; height:200px;"><canvas id="catDonutChart"></canvas></div>
      </div>
      <div class="card" style="padding:18px 20px;">
        <p style="font-size:12px; font-weight:700; color:#8B95A1; margin-bottom:10px;">카테고리별 상세</p>
        <div id="cat-analysis-bars"></div>
      </div>
    </div>

    <!-- ── 섹션: 분류 ── -->
    <div id="asec-class" class="asec" style="display:none;">
      <div class="card" style="padding:18px 20px;">
        <p style="font-size:12px; font-weight:700; color:#8B95A1; margin-bottom:10px;">분류(누구)별 지출</p>
        <div id="class-analysis-bars"></div>
      </div>
    </div>

    <!-- ── 섹션: 구매처 ── -->
    <div id="asec-sub" class="asec" style="display:none;">
      <div class="card" style="padding:18px 20px;">

<!-- ════════════════════════════════════════
     JAVASCRIPT
════════════════════════════════════════ -->
<script>
const API_URL = "https://script.google.com/macros/s/AKfycbwrD9qwVqlPJbgt5yDJC3dU7IsemRprxDVQ7YAsmZbMgyq-HzTxfDAqncB_ZX8KiopN/exec";

let weeklyChart = null;
let allData = [];
let activeChipFilter = 'all';

// ── 타임존 안전 날짜 유틸 ────────────────────────────────
// API가 "2026-04-25T15:00:00.000Z" 같은 UTC ISO 문자열을 반환할 때
// split('T')[0]으로 자르면 UTC 날짜(KST 기준 하루 전)가 나오는 버그를 방지.
// 항상 JS 로컬(getFullYear/Month/Date)로 변환해 로컬 날짜 문자열을 반환.
function toLocalDateStr(dateVal) {
  if (!dateVal) return '';
  const d = new Date(dateVal);
  if (isNaN(d)) return String(dateVal).substring(0, 10);
  const y  = d.getFullYear();
  const mo = String(d.getMonth() + 1).padStart(2, '0');
  const dy = String(d.getDate()).padStart(2, '0');
  return `${y}-${mo}-${dy}`;
}
// YYYY-MM-DD 문자열 → 로컬 자정 Date 객체 (요일 계산 등에 사용)
function parseLocalDate(ymd) {
  if (!ymd) return new Date(NaN);
  const [y, m, d] = ymd.split('-').map(Number);
  return new Date(y, m - 1, d);
}

// ── Category config ─────────────────────────────────────
const CAT_CFG = {
  '1. 식자재':            { icon: '🥦', bg: '#E8F5E9', color: '#2E7D32' },
  '2. 생필품':            { icon: '🏠', bg: '#E3F2FD', color: '#1565C0' },
  '3. 외식/커피':         { icon: '☕', bg: '#FFF3E0', color: '#E65100' },
  '4. 쇼핑':              { icon: '🛍️', bg: '#FCE4EC', color: '#AD1457' },
  '5. 기타':              { icon: '📦', bg: '#F5F5F5', color: '#616161' },
  '6. 주유/차량':         { icon: '🚗', bg: '#E8EAF6', color: '#283593' },
  '7. 문화':              { icon: '🎬', bg: '#EDE7F6', color: '#4527A0' },
  '8. 개인 사용':         { icon: '👤', bg: '#FFF8E1', color: '#F57F17' },
  '9. 경조사/세금/공과금':{ icon: '📋', bg: '#ECEFF1', color: '#546E7A' },
  '10. 저축/투자':        { icon: '💰', bg: '#E8F5E9', color: '#1B5E20' },
  '11. 여행/가족':        { icon: '✈️', bg: '#E0F7FA', color: '#00695C' },
  '12. 병원/약국':        { icon: '💊', bg: '#FCE4EC', color: '#880E4F' },
  '13. 1회성(가구,비품)': { icon: '🪑', bg: '#F3E5F5', color: '#6A1B9A' },
  '14. 나윤':             { icon: '👧', bg: '#FFF9C4', color: '#F9A825' },
};

function getCat(cat) {
  if (!cat) return { icon: '💸', bg: '#F5F5F5', color: '#8B95A1' };
  const exact = CAT_CFG[cat];
  if (exact) return exact;
  const key = Object.keys(CAT_CFG).find(k => cat.includes(k));
  return CAT_CFG[key] || { icon: '💸', bg: '#F5F5F5', color: '#8B95A1' };
}

function getSettlementBadge(st) {
  if (!st) return '';
  if (st.includes('정산 필요') || st.includes('지급 대기'))
    return `<span class="badge badge-red">${st}</span>`;
  if (st.includes('지급 완료'))
    return `<span class="badge badge-blue">${st}</span>`;
  if (st.includes('개인사용'))
    return `<span class="badge badge-orange">${st}</span>`;
  if (st.includes('불필요'))
    return `<span class="badge badge-gray">${st}</span>`;
  return `<span class="badge badge-gray">${st}</span>`;
}

// ── Tab switching ────────────────────────────────────────
function switchTab(tab) {
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  const navBtn = document.getElementById('nav-' + tab);
  if (navBtn) navBtn.classList.add('active');
  document.getElementById('addCircle').style.background =
    tab === 'add' ? '#0052D9' : '#0064FF';
  window.scrollTo({ top: 0, behavior: 'smooth' });
  if (tab === 'analysis' && allData.length) renderAnalysis();
}

// ── Month ────────────────────────────────────────────────
const today = new Date();
document.getElementById('date').valueAsDate = today;
document.getElementById('todayDateDisplay').innerText =
  today.toLocaleDateString('ko-KR', { year:'numeric', month:'long', day:'numeric', weekday:'long' });

const currentMonthStr = today.toISOString().substring(0, 7);
document.getElementById('monthSelector').value = currentMonthStr;
updateMonthLabel(currentMonthStr);

function updateMonthLabel(val) {
  const [y, m] = val.split('-');
  document.getElementById('monthLabel').innerText = `${y}년 ${parseInt(m)}월`;
}
function onMonthChange() {
  updateMonthLabel(document.getElementById('monthSelector').value);
  applyFilters();
  if (document.getElementById('tab-analysis').classList.contains('active')) renderAnalysis();
}

// ── Load Data ────────────────────────────────────────────
async function loadData() {
  document.getElementById('loading').style.display = 'flex';
  document.getElementById('recordList').innerHTML = '';
  try {
    const res = await fetch(API_URL + '?t=' + Date.now());
    const result = await res.json();
    allData = result.data || [];
    const entities = result.entities || null;
    document.getElementById('loading').style.display = 'none';
    if (entities) {
      // API 엔티티 키 실제 매핑:
      // entities.Class      → 분류 값
      // entities.Category   → 카테고리 값
      // entities.Settlement → 서브카테고리(구매처) 값  ← API 버그: 키 이름 불일치
      // entities.Closed     → 정산 상태 값            ← API 버그: 키 이름 불일치
      populateDropdown('class',       entities.Class);
      populateDropdown('category',    entities.Category);
      populateDropdown('subCategory', entities.Settlement);  // 실제로는 구매처 목록
      populateDropdown('settlement',  entities.Closed);      // 실제로는 정산상태 목록
      populateFilterSelect('filterClass',       entities.Class,      '👤 분류');
      populateFilterSelect('filterCategory',    entities.Category,   '🏷️ 카테고리');
      populateFilterSelect('filterSubCategory', entities.Settlement, '📍 구매처');
      populateFilterSelect('filterSettlement',  entities.Closed,     '💳 정산');
      setFormDefaults(); // 기본값 세팅
    }
    applyFilters();
  } catch (e) {
    document.getElementById('loading').innerHTML =
      `<div style="text-align:center; padding:32px; color:#8B95A1;">
        <p style="font-size:32px; margin-bottom:8px;">😢</p>
        <p style="font-weight:600;">데이터를 불러올 수 없습니다</p>
        <button onclick="loadData()" style="margin-top:12px; color:#0064FF; font-weight:700; background:none; border:none; cursor:pointer; font-size:14px;">다시 시도</button>
      </div>`;
  }
}

function populateDropdown(id, arr) {
  const el = document.getElementById(id);
  el.innerHTML = '';
  (arr || []).forEach(v => {
    const opt = document.createElement('option');
    opt.value = opt.textContent = v;
    el.appendChild(opt);
  });
}
function populateFilterSelect(id, arr, placeholder) {
  const el = document.getElementById(id);
  el.innerHTML = `<option value="">${placeholder}</option>`;
  (arr || []).forEach(v => {
    const opt = document.createElement('option');
    opt.value = opt.textContent = v;
    el.appendChild(opt);
  });
}

// ── Form defaults ────────────────────────────────────────
const NO_SETTLEMENT_CLASSES = new Set([
  '공용카드(쿠팡)', '공용계좌(토스)', '온누리', '제외(개인/저축/이자)'
]);

function getSettlementDefault(cls) {
  return NO_SETTLEMENT_CLASSES.has(cls) ? '정산 불필요' : '정산 필요';
}

function setFormDefaults() {
  if (document.getElementById('editId').value) return; // 수정 모드면 건너뜀
  const setVal = (id, val) => {
    const el = document.getElementById(id);
    if (el && [...el.options].some(o => o.value === val)) el.value = val;
  };
  setVal('class', '공용카드(쿠팡)');
  setVal('settlement', getSettlementDefault('공용카드(쿠팡)'));
}

// 분류 변경 시 정산 상태 자동 업데이트
function onClassChange() {
  if (document.getElementById('editId').value) return; // 수정 모드면 건너뜀
  const cls = document.getElementById('class').value;
  const defaultSettlement = getSettlementDefault(cls);
  const settlementEl = document.getElementById('settlement');
  if (settlementEl && [...settlementEl.options].some(o => o.value === defaultSettlement)) {
    settlementEl.value = defaultSettlement;
  }
}

// ── Chip filter ──────────────────────────────────────────
function setChipFilter(type) {
  activeChipFilter = type;
  document.getElementById('chip-all').classList.toggle('active', type === 'all');
  document.getElementById('chip-pending').classList.toggle('active', type === 'pending');
  applyFilters();
}
function resetFilters() {
  ['filterDate','filterClass','filterCategory','filterSubCategory','filterSettlement','filterClosed']
    .forEach(id => document.getElementById(id).value = '');
  activeChipFilter = 'all';
  document.getElementById('chip-all').classList.add('active');
  document.getElementById('chip-pending').classList.remove('active');
  applyFilters();
}

// ── Main filter ──────────────────────────────────────────
function applyFilters() {
  const month = document.getElementById('monthSelector').value;
  const sort  = document.getElementById('sortSelector').value;
  const fCls  = document.getElementById('filterClass').value;
  const fCat  = document.getElementById('filterCategory').value;
  const fSub  = document.getElementById('filterSubCategory').value;
  const fSt   = document.getElementById('filterSettlement').value;

  renderDashboard(allData, month);

  let filtered = allData.filter(r => r.Date && toLocalDateStr(r.Date).startsWith(month));
  if (fCls) filtered = filtered.filter(r => r.Class === fCls);
  if (fCat) filtered = filtered.filter(r => r.Category === fCat);
  if (fSub) filtered = filtered.filter(r => r.SubCategory === fSub);
  if (fSt)  filtered = filtered.filter(r => r.Settlement === fSt);
  if (activeChipFilter === 'pending')
    filtered = filtered.filter(r => r.Settlement &&
      (r.Settlement.includes('정산 필요') || r.Settlement.includes('지급 대기')));

  filtered.sort((a, b) => {
    const dA = +new Date(a.Date)||0, dB = +new Date(b.Date)||0;
    const aA = Number(a.Amount)||0, aB = Number(b.Amount)||0;
    if (sort==='dateDesc')   return dB-dA || b.ID-a.ID;
    if (sort==='dateAsc')    return dA-dB || a.ID-b.ID;
    if (sort==='amountDesc') return aB-aA || dB-dA;
    if (sort==='amountAsc')  return aA-aB || dB-dA;
  });

  renderList(filtered);
}

// ── Render List ──────────────────────────────────────────
function renderList(data) {
  const container = document.getElementById('recordList');
  container.innerHTML = '';

  if (!data.length) {
    container.innerHTML = `
      <div style="text-align:center; padding:48px 0;">
        <p style="font-size:40px; margin-bottom:10px;">🔍</p>
        <p style="font-weight:700; color:#8B95A1; font-size:15px;">내역이 없습니다</p>
        <button onclick="switchTab('add')"
          style="margin-top:14px; color:#0064FF; font-weight:700; background:#EBF4FF;
                 border:none; padding:10px 20px; border-radius:20px; cursor:pointer; font-size:14px;">
          + 첫 기록 남기기
        </button>
      </div>`;
    return;
  }

  // Group by date
  const groups = {};
  data.forEach(r => {
    const k = toLocalDateStr(r.Date);
    if (!groups[k]) groups[k] = [];
    groups[k].push(r);
  });

  const DAY_KO = ['일','월','화','수','목','금','토'];

  Object.entries(groups).forEach(([dateKey, rows]) => {
    const d = parseLocalDate(dateKey);
    const dayTotal = rows.reduce((s, r) => s + (Number(r.Amount)||0), 0);
    const dayStr = isNaN(d)
      ? dateKey
      : `${d.getMonth()+1}월 ${d.getDate()}일 (${DAY_KO[d.getDay()]})`;

    // Date header
    const header = document.createElement('div');
    header.className = 'date-header';
    header.style.marginTop = '16px';
    header.innerHTML = `
      <span style="font-size:12px; font-weight:700; color:#8B95A1;">${dayStr}</span>
      <span style="font-size:12px; font-weight:700; color:#546E7A;">₩${dayTotal.toLocaleString('ko-KR')}</span>`;
    container.appendChild(header);

    // Records
    rows.forEach(row => {
      const amt = Number(row.Amount)||0;
      const cat = getCat(row.Category);
      const isHigh = amt >= 100000;
      const wrap = document.createElement('div');
      wrap.style.marginBottom = '6px';

      const card = document.createElement('div');
      card.className = 'record-card';

      const rowDiv = document.createElement('div');
      rowDiv.className = 'record-row';
      rowDiv.onclick = () => actionsDiv.classList.toggle('open');
      rowDiv.innerHTML = `
        <div class="cat-icon" style="background:${cat.bg};">${cat.icon}</div>
        <div style="flex:1; min-width:0;">
          <p style="font-size:14px; font-weight:700; color:#191F28; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-bottom:3px;">
            ${row.Item || row.SubCategory || '내용 없음'}
          </p>
          <div style="display:flex; align-items:center; gap:6px; flex-wrap:wrap;">
            <span style="font-size:11px; font-weight:600; color:${cat.color};">${row.Category||''}</span>
            ${row.SubCategory ? `<span style="font-size:11px;color:#C8CDD2;">·</span><span style="font-size:11px;color:#8B95A1;">${row.SubCategory}</span>` : ''}
          </div>
          <div style="margin-top:4px;">${getSettlementBadge(row.Settlement)}</div>
        </div>
        <div style="text-align:right; flex-shrink:0;">
          <p style="font-size:15px; font-weight:800; color:${isHigh?'#E53E3E':'#191F28'}; letter-spacing:-0.5px;">
            ₩${amt.toLocaleString('ko-KR')}
          </p>
          <p style="font-size:10px; color:#B0B8C1; margin-top:2px;">${row.Class||''}</p>
        </div>`;

      const actionsDiv = document.createElement('div');
      actionsDiv.className = 'record-actions';
      actionsDiv.innerHTML = `
        <div class="record-actions-inner">
          <button onclick="startEdit('${row.ID}')"
            style="flex:1; font-size:13px; font-weight:700; color:#0064FF; background:#EBF4FF;
                   border:none; padding:9px; border-radius:10px; cursor:pointer;">✏️ 수정</button>
          <button onclick="deleteRecord('${row.ID}')"
            style="flex:1; font-size:13px; font-weight:700; color:#E53E3E; background:#FFF0F0;
                   border:none; padding:9px; border-radius:10px; cursor:pointer;">🗑️ 삭제</button>
        </div>`;

      card.appendChild(rowDiv);
      card.appendChild(actionsDiv);
      wrap.appendChild(card);
      container.appendChild(wrap);
    });
  });
}

// ── Render Dashboard ─────────────────────────────────────
function renderDashboard(data, month) {
  let total = 0, pending = 0;
  const weekly = { '1주':0, '2주':0, '3주':0, '4주':0, '5주':0 };
  const catMap = {};

  data.forEach(r => {
    const amt = Number(r.Amount)||0;
    if (r.Settlement && (r.Settlement.includes('정산 필요') || r.Settlement.includes('지급 대기')))
      pending += amt;
    if (r.Date && toLocalDateStr(r.Date).startsWith(month)) {
      if (r.Class !== '제외(개인/저축/이자)' && r.Category !== '10. 저축/투자') {
        total += amt;
        const day = parseLocalDate(toLocalDateStr(r.Date)).getDate();
        weekly[`${Math.min(Math.ceil(day/7),5)}주`] += amt;
        catMap[r.Category||'기타'] = (catMap[r.Category||'기타']||0) + amt;
      }
    }
  });

  const mo = parseInt(month.split('-')[1]);
  document.getElementById('expenseLabel').innerText = `${mo}월 순수 지출`;
  document.getElementById('chartLabel').innerText   = `${mo}월 주차별 지출`;
  document.getElementById('totalExpense').innerText = '₩' + total.toLocaleString('ko-KR');
  document.getElementById('pendingAmount').innerText= '₩' + pending.toLocaleString('ko-KR');

  drawWeeklyChart(weekly);
  renderCatBreakdown(catMap, total);
}

function drawWeeklyChart(data) {
  const ctx = document.getElementById('weeklyChart').getContext('2d');
  if (weeklyChart) weeklyChart.destroy();
  const vals = Object.values(data);
  if (vals.every(v => !v)) return;
  const maxVal = Math.max(...vals);
  weeklyChart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: Object.keys(data),
      datasets: [{
        data: vals,
        backgroundColor: vals.map(v => v === maxVal && v > 0 ? '#0064FF' : '#C2D4FF'),
        borderRadius: 8,
        borderSkipped: false,
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: { label: c => '₩'+c.raw.toLocaleString('ko-KR') } }
      },
      scales: {
        x: { grid: { display:false }, border: { display:false },
             ticks: { font:{size:11}, color:'#8B95A1' } },
        y: { beginAtZero:true, grid:{color:'#F5F6F8'}, border:{display:false},
             ticks: { font:{size:10}, color:'#8B95A1',
               callback: v => v>=10000 ? (v/10000).toFixed(v%10000?1:0)+'만' : v } }
      }
    }
  });
}

function renderCatBreakdown(catMap, total) {
  const el = document.getElementById('catBreakdown');
  const sorted = Object.entries(catMap).sort((a,b) => b[1]-a[1]).slice(0,6);
  if (!sorted.length) {
    el.innerHTML = '<p style="text-align:center;color:#B0B8C1;font-size:13px;padding:12px 0;">지출 내역 없음</p>';
    return;
  }
  const maxAmt = sorted[0][1];
  el.innerHTML = sorted.map(([cat, amt]) => {
    const c = getCat(cat);
    const pct = total > 0 ? ((amt/total)*100).toFixed(0) : 0;
    const barW = maxAmt > 0 ? ((amt/maxAmt)*100).toFixed(0) : 0;
    return `
      <div style="display:flex; align-items:center; gap:10px;">
        <div class="cat-icon-sm" style="background:${c.bg};">${c.icon}</div>
        <div style="flex:1; min-width:0;">
          <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:5px;">
            <span style="font-size:12px; font-weight:600; color:#3D4D5C;">${cat}</span>
            <span style="font-size:12px; font-weight:800; color:#191F28; letter-spacing:-0.3px;">₩${amt.toLocaleString('ko-KR')}</span>
          </div>
          <div class="prog-bar">
            <div class="prog-fill" style="width:${barW}%; background:${c.color}; opacity:0.75;"></div>
          </div>
        </div>
        <span style="font-size:11px; font-weight:800; color:${c.color}; width:32px; text-align:right; flex-shrink:0;">${pct}%</span>
      </div>`;
  }).join('');
}

// ── Delete ───────────────────────────────────────────────
async function deleteRecord(id) {
  if (!confirm('정말 삭제하시겠습니까?')) return;
  try {
    const url = API_URL + '?payload=' + encodeURIComponent(JSON.stringify({ action:'delete', id }));
    const res    = await fetch(url);
    const result = await res.json();
    if (result.status !== 'success') throw new Error(result.error || '삭제 실패');
    loadData();
  } catch(e) { alert('삭제 실패: ' + e.message); }
}

// ── Edit ─────────────────────────────────────────────────
function startEdit(id) {
  const row = allData.find(d => d.ID.toString() === id.toString());
  if (!row) return;
  document.getElementById('editId').value     = row.ID;
  document.getElementById('date').value       = toLocalDateStr(row.Date);
  document.getElementById('amount').value     = row.Amount;
  document.getElementById('class').value      = row.Class;
  document.getElementById('category').value   = row.Category;
  document.getElementById('subCategory').value= row.SubCategory;
  document.getElementById('item').value       = row.Item;
  document.getElementById('settlement').value = row.Settlement;
  document.getElementById('formTitle').innerText = '기록 수정';
  document.getElementById('submitBtn').className = 'btn-edit';
  document.getElementById('submitBtn').innerText  = '수정 저장';
  document.getElementById('cancelEditBtn').classList.remove('hidden');
  switchTab('add');
}

function cancelEdit() {
  document.getElementById('recordForm').reset();
  document.getElementById('editId').value = '';
  document.getElementById('date').valueAsDate = new Date();
  document.getElementById('formTitle').innerText  = '새 지출 기록';
  document.getElementById('submitBtn').className  = 'btn-primary';
  document.getElementById('submitBtn').innerText   = '저장하기';
  document.getElementById('cancelEditBtn').classList.add('hidden');
  setFormDefaults(); // 취소 후 기본값 복원
}

// ── Submit ───────────────────────────────────────────────
document.getElementById('recordForm').addEventListener('submit', async e => {
  e.preventDefault();
  const btn = document.getElementById('submitBtn');
  const orig = btn.innerText;
  btn.innerText = '저장 중...'; btn.disabled = true;
  const editId = document.getElementById('editId').value;
  const payload = {
    action: editId ? 'update' : 'create', id: editId,
    Date:        document.getElementById('date').value,
    Amount:      document.getElementById('amount').value,
    Class:       document.getElementById('class').value,
    Category:    document.getElementById('category').value,
    SubCategory: document.getElementById('subCategory').value,
    Item:        document.getElementById('item').value,
    Settlement:  document.getElementById('settlement').value,
    Closed:      'Yes',  // 등록 시 자동 마감 처리
  };
  try {
    const url    = API_URL + '?payload=' + encodeURIComponent(JSON.stringify(payload));
    const res    = await fetch(url);
    const result = await res.json();
    if (result.status !== 'success') throw new Error(result.error || '저장 실패');
    cancelEdit();
    loadData();
    switchTab('home');
  } catch(e) {
    alert('저장 실패: ' + e.message);
  } finally {
    btn.innerText = orig; btn.disabled = false;
  }
});

//  ANALYSIS UPDATE TRIGGER
// ════════════════════════════════════════════════════════
async function triggerAnalysisUpdate() {
  const btn      = document.getElementById('updateAnalysisBtn');
  const iconEl   = document.getElementById('updateAnalysisBtnIcon');
  const textEl   = document.getElementById('updateAnalysisBtnText');

  btn.disabled   = true;
  btn.style.opacity = '0.7';
  iconEl.innerText = '⏳';
  textEl.innerText = '업데이트 중... (20~30초 소요)';

  try {
    const url    = API_URL + '?payload=' + encodeURIComponent(JSON.stringify({ action: 'updateAnalysis' }));
    const res    = await fetch(url);
    const result = await res.json();
    if (result.status !== 'success') throw new Error(result.error || '업데이트 실패');
    iconEl.innerText = '✅';
    textEl.innerText = '업데이트 완료!';
    setTimeout(() => {
      iconEl.innerText = '📊';
      textEl.innerText = '스프레드시트 분석 업데이트';
    }, 3000);
  } catch (e) {
    iconEl.innerText = '❌';
    textEl.innerText = '실패 — 다시 시도';

    btn.style.opacity = '1';

//  ANALYSIS TAB
// ════════════════════════════════════════════════════════
let analysisScope     = 'all';
let monthlyChartInst  = null;
let catChartInst      = null;
let top10View         = 'all'; // 'all' | 'budget' | 'nonbudget'

// ── Budget targets ────────────────────────────────────────
// 예산 집계 대상 카테고리 (reference 시트 기준 7개)
const BUDGET_CATEGORIES = new Set([
  '1. 식자재', '2. 생필품', '3. 외식/커피',
  '4. 쇼핑', '5. 기타', '6. 주유/차량', '7. 문화'
]);

const DEFAULT_BUDGET = {1:1200000,2:750000,3:750000,4:750000,5:750000,6:750000,
                         7:750000,8:750000,9:750000,10:750000,11:750000,12:750000};
let budgetTargets = (() => {
  try {
    const s = localStorage.getItem('budgetTargets');
    return s ? JSON.parse(s) : { ...DEFAULT_BUDGET };
  } catch { return { ...DEFAULT_BUDGET }; }
})();
function saveBudgetTargets() {
  try { localStorage.setItem('budgetTargets', JSON.stringify(budgetTargets)); } catch {}
}

// ── Scope toggle ─────────────────────────────────────────
function setAnalysisScope(scope) {
  analysisScope = scope;
  const allBtn   = document.getElementById('scope-all');
  const moBtn    = document.getElementById('scope-month');
  allBtn.style.background  = scope === 'all'   ? '#0064FF' : '#F5F6F8';
  allBtn.style.color       = scope === 'all'   ? 'white'   : '#8B95A1';
  moBtn.style.background   = scope === 'month' ? '#0064FF' : '#F5F6F8';
  moBtn.style.color        = scope === 'month' ? 'white'   : '#8B95A1';
  renderAnalysis();
}

// ── Section chip switcher ────────────────────────────────
function switchAnalysisSection(sec) {
  document.querySelectorAll('.asec').forEach(el => el.style.display = 'none');
  document.getElementById('asec-' + sec).style.display = 'block';
  document.querySelectorAll('.asec-chip').forEach(el => el.classList.remove('active'));
  document.getElementById('chip-asec-' + sec).classList.add('active');
  renderAnalysis();
}

// ── Main render ──────────────────────────────────────────
function renderAnalysis() {
  if (!allData.length) return;
  const currentMonth = document.getElementById('monthSelector').value;

  const base = analysisScope === 'month'
    ? allData.filter(r => r.Date && toLocalDateStr(r.Date).startsWith(currentMonth))
    : allData;

  // "순수 지출" excludes savings & personal-exclusion class
  const pure = base.filter(r =>
    r.Class !== '제외(개인/저축/이자)' && r.Category !== '10. 저축/투자'
  );

  const visible = ['monthly','category','class','sub','top'].find(s => {
    const el = document.getElementById('asec-' + s);
    return el && el.style.display !== 'none';
  }) || 'monthly';

  if (visible === 'monthly')  { drawMonthlySection(pure, currentMonth); drawBudgetSection(pure, currentMonth); }
  if (visible === 'category') drawCategorySection(pure);
  if (visible === 'class')    drawClassSection(pure);
  if (visible === 'sub')      drawSubSection(pure);
  if (visible === 'top')      drawTop10Section(allData, currentMonth);
}

// ── Monthly section ──────────────────────────────────────
function drawMonthlySection(data, currentMonth) {
  const monthMap = {};
  data.forEach(r => {
    if (!r.Date) return;
    const mo = toLocalDateStr(r.Date).substring(0, 7);
    monthMap[mo] = (monthMap[mo] || 0) + (Number(r.Amount) || 0);
  });

  const months = Object.keys(monthMap).sort();
  const vals   = months.map(m => monthMap[m]);

  const ctx = document.getElementById('monthlyAnalysisChart').getContext('2d');
  if (monthlyChartInst) { monthlyChartInst.destroy(); monthlyChartInst = null; }

  if (!months.length) {
    document.getElementById('monthly-analysis-table').innerHTML =
      '<p style="text-align:center;color:#B0B8C1;padding:20px;">데이터 없음</p>';
    return;
  }

  monthlyChartInst = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: months.map(m => {
        const [y, mo] = m.split('-');
        return `${y.slice(2)}.${mo}`;
      }),
      datasets: [{
        data: vals,
        backgroundColor: months.map(m => m === currentMonth ? '#0064FF' : '#C2D4FF'),
        borderRadius: 8,
        borderSkipped: false,
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: { label: c => '₩' + c.raw.toLocaleString('ko-KR') } }
      },
      scales: {
        x: { grid: { display: false }, border: { display: false },
             ticks: { font: { size: 10 }, color: '#8B95A1', maxRotation: 0 } },
        y: { beginAtZero: true, grid: { color: '#F5F6F8' }, border: { display: false },
             ticks: { font: { size: 10 }, color: '#8B95A1',
               callback: v => v >= 10000 ? (v/10000).toFixed(0) + '만' : v } }
      }
    }
  });

  // Summary table (newest first)
  const total = vals.reduce((s, v) => s + v, 0);
  const avg   = months.length ? Math.round(total / months.length) : 0;

  const rows = [...months].reverse().map(m => {
    const [y, mo] = m.split('-');
    const amt     = monthMap[m];
    const count   = data.filter(r => r.Date && toLocalDateStr(r.Date).startsWith(m)).length;
    const isCur   = m === currentMonth;
    return `
      <div style="display:flex; align-items:center; justify-content:space-between;
                  padding:10px 0; border-bottom:1px solid #F5F6F8;">
        <div style="display:flex; align-items:center; gap:8px;">
          <span style="width:6px; height:6px; border-radius:50%; flex-shrink:0;
                       background:${isCur ? '#0064FF' : 'transparent'};
                       border:${isCur ? 'none' : '1px solid #E5E8EB'};"></span>
          <span style="font-size:13px; font-weight:${isCur?'800':'600'};
                       color:${isCur?'#0064FF':'#3D4D5C'};">${y}년 ${parseInt(mo)}월</span>
          <span style="font-size:11px; color:#B0B8C1;">${count}건</span>
        </div>
        <span style="font-size:14px; font-weight:800; letter-spacing:-0.5px;
                     color:${isCur?'#0064FF':'#191F28'};">₩${amt.toLocaleString('ko-KR')}</span>
      </div>`;
  }).join('');

  document.getElementById('monthly-analysis-table').innerHTML = `
    ${rows}
    <div style="display:flex; justify-content:space-between; padding:12px 0 2px; margin-top:2px;">
      <span style="font-size:12px; font-weight:600; color:#8B95A1;">월 평균</span>
      <span style="font-size:14px; font-weight:800; color:#3D4D5C;">₩${avg.toLocaleString('ko-KR')}</span>
    </div>`;
}

// ── Budget vs Actual ─────────────────────────────────────
function drawBudgetSection(data, currentMonth) {
  // 예산 집계 대상 7개 카테고리만 필터
  const budgetData = data.filter(r => BUDGET_CATEGORIES.has(r.Category));

  const monthMap = {};
  budgetData.forEach(r => {
    if (!r.Date) return;
    const mo = toLocalDateStr(r.Date).substring(0, 7);
    monthMap[mo] = (monthMap[mo] || 0) + (Number(r.Amount) || 0);
  });

  const months = Object.keys(monthMap).sort();
  if (!months.length) {
    document.getElementById('budget-table').innerHTML =
      '<p style="text-align:center;color:#B0B8C1;padding:12px;">데이터 없음</p>';
    return;
  }

  // Cumulative summary
  let totalActual = 0, totalTarget = 0;
  months.forEach(m => {
    const moNum = parseInt(m.split('-')[1]);
    totalActual += monthMap[m];
    totalTarget += (budgetTargets[moNum] || 750000);
  });
  const totalGap  = totalActual - totalTarget;
  const totalOver = totalGap > 0;

  const summaryBar = `
    <div style="background:${totalOver ? '#FFF5F5' : '#F0FAF2'}; border-radius:12px; padding:12px 14px;
                margin-bottom:12px; display:flex; justify-content:space-between; align-items:center;">
      <div>
        <p style="font-size:11px; font-weight:600; color:#8B95A1; margin-bottom:3px;">${months.length}개월 누적</p>
        <p style="font-size:16px; font-weight:900; letter-spacing:-0.5px; color:${totalOver ? '#E53E3E' : '#2E7D32'};">
          ${totalOver ? '▲ +' : '▼ -'}₩${Math.abs(totalGap).toLocaleString('ko-KR')}
        </p>
        <p style="font-size:11px; color:${totalOver ? '#E53E3E' : '#2E7D32'}; font-weight:600; margin-top:2px;">
          목표 대비 ${totalOver ? '초과' : '절약'}
        </p>
      </div>
      <div style="text-align:right;">
        <p style="font-size:11px; color:#8B95A1; margin-bottom:3px;">목표 ₩${totalTarget.toLocaleString('ko-KR')}</p>
        <p style="font-size:11px; color:#8B95A1;">실제 ₩${totalActual.toLocaleString('ko-KR')}</p>
      </div>
    </div>`;

  const rows = [...months].reverse().map(m => {
    const [y, mo] = m.split('-');
    const moNum   = parseInt(mo);
    const actual  = monthMap[m];
    const target  = budgetTargets[moNum] || 750000;
    const gap     = actual - target;
    const over    = gap > 0;
    const isCur   = m === currentMonth;
    const fillPct = Math.min((actual / target) * 100, 100).toFixed(0);
    const gapPct  = target > 0 ? Math.abs((gap / target) * 100).toFixed(0) : 0;

    return `
      <div style="padding:11px 0; border-bottom:1px solid #F5F6F8;">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:5px;">
          <div style="display:flex; align-items:center; gap:7px;">
            <span style="width:6px; height:6px; border-radius:50%; flex-shrink:0;
                         background:${isCur ? '#0064FF' : 'transparent'};
                         border:${isCur ? 'none' : '1px solid #E5E8EB'};"></span>
            <span style="font-size:13px; font-weight:${isCur ? '800' : '600'};
                         color:${isCur ? '#0064FF' : '#3D4D5C'};">${y}년 ${moNum}월</span>
          </div>
          <span style="font-size:11px; font-weight:700; padding:2px 9px; border-radius:20px;
                       background:${over ? '#FFF0F0' : '#F0FAF2'}; color:${over ? '#E53E3E' : '#2E7D32'};">
            ${over ? '▲ +' : '▼ -'}${gapPct}%
          </span>
        </div>
        <div style="display:flex; gap:10px; font-size:11px; color:#8B95A1; margin-bottom:7px; flex-wrap:wrap;">
          <span>목표 <strong style="color:#3D4D5C;">₩${target.toLocaleString('ko-KR')}</strong></span>
          <span style="color:#D0D5DD;">·</span>
          <span>실제 <strong style="color:${over ? '#E53E3E' : '#2E7D32'};">₩${actual.toLocaleString('ko-KR')}</strong></span>
          <span style="color:#D0D5DD;">·</span>
          <span>차이 <strong style="color:${over ? '#E53E3E' : '#2E7D32'};">${over ? '+' : '-'}₩${Math.abs(gap).toLocaleString('ko-KR')}</strong></span>
        </div>
        <div class="prog-bar" style="height:7px;">
          <div class="prog-fill" style="width:${fillPct}%; background:${over ? '#E53E3E' : '#4CAF50'};"></div>
        </div>
      </div>`;
  }).join('');

  document.getElementById('budget-table').innerHTML = summaryBar + rows;
}

// ── Budget edit UI ────────────────────────────────────────

function applyBudgetEdit() {
  for (let mo = 1; mo <= 12; mo++) {

  }
  saveBudgetTargets();
  toggleBudgetEdit();
  renderAnalysis();
}

function resetBudgetToDefault() {
  if (!confirm('목표 금액을 기본값으로 초기화할까요?\n(1월 120만원 / 2~12월 75만원)')) return;
  budgetTargets = { ...DEFAULT_BUDGET };
  saveBudgetTargets();
  toggleBudgetEdit();
  renderAnalysis();
}

// ── Category section ─────────────────────────────────────
function drawCategorySection(data) {
  const catMap = {};
  data.forEach(r => {
    const cat = r.Category || '기타';
    catMap[cat] = (catMap[cat] || 0) + (Number(r.Amount) || 0);
  });

  const sorted = Object.entries(catMap).sort((a, b) => b[1] - a[1]);
  const total  = sorted.reduce((s, [, v]) => s + v, 0);

  const ctx = document.getElementById('catDonutChart').getContext('2d');
  if (catChartInst) { catChartInst.destroy(); catChartInst = null; }

  if (!sorted.length) {
    document.getElementById('cat-analysis-bars').innerHTML =
      '<p style="text-align:center;color:#B0B8C1;padding:20px;">데이터 없음</p>';
    return;
  }

  const colors = sorted.map(([cat]) => getCat(cat).color);

  catChartInst = new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels: sorted.map(([cat]) => cat),
      datasets: [{
        data: sorted.map(([, v]) => v),
        backgroundColor: colors.map(c => c + 'BF'),
        borderColor: colors,
        borderWidth: 2,
        hoverOffset: 10,
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      cutout: '62%',
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: c => {
              const pct = total > 0 ? ((c.raw / total) * 100).toFixed(1) : 0;
              return ` ₩${c.raw.toLocaleString('ko-KR')} (${pct}%)`;
            }
          }
        }
      }
    }
  });

  const max = sorted[0][1];
  document.getElementById('cat-analysis-bars').innerHTML = sorted.map(([cat, amt]) => {
    const c    = getCat(cat);
    const pct  = total > 0 ? ((amt / total) * 100).toFixed(1) : 0;
    const barW = max > 0 ? ((amt / max) * 100).toFixed(0) : 0;
    return `
      <div style="display:flex; align-items:center; gap:10px; padding:9px 0; border-bottom:1px solid #F5F6F8;">
        <div class="cat-icon-sm" style="background:${c.bg}; flex-shrink:0;">${c.icon}</div>
        <div style="flex:1; min-width:0;">
          <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:5px;">
            <span style="font-size:12px; font-weight:600; color:#3D4D5C; white-space:nowrap;
                         overflow:hidden; text-overflow:ellipsis; max-width:150px;">${cat}</span>
            <span style="font-size:13px; font-weight:800; color:#191F28; letter-spacing:-0.3px;
                         flex-shrink:0; margin-left:8px;">₩${amt.toLocaleString('ko-KR')}</span>
          </div>
          <div class="prog-bar">
            <div class="prog-fill" style="width:${barW}%; background:${c.color}; opacity:0.75;"></div>
          </div>
        </div>
        <span style="font-size:11px; font-weight:800; color:${c.color}; width:40px;
                     text-align:right; flex-shrink:0;">${pct}%</span>
      </div>`;
  }).join('');
}

// ── Class (분류) section ─────────────────────────────────
function drawClassSection(data) {
  const clsMap = {};
  data.forEach(r => {
    const cls = r.Class || '미분류';
    clsMap[cls] = (clsMap[cls] || 0) + (Number(r.Amount) || 0);
  });

  const sorted = Object.entries(clsMap).sort((a, b) => b[1] - a[1]);
  const total  = sorted.reduce((s, [, v]) => s + v, 0);
  const max    = sorted.length ? sorted[0][1] : 1;
  const COLS   = ['#0064FF','#4CAF50','#FF8A00','#9C27B0','#E53E3E','#00BCD4','#FF5722','#607D8B'];

  document.getElementById('class-analysis-bars').innerHTML = sorted.length
    ? sorted.map(([cls, amt], i) => {
        const pct   = total > 0 ? ((amt / total) * 100).toFixed(1) : 0;
        const barW  = max  > 0 ? ((amt / max)   * 100).toFixed(0) : 0;
        const col   = COLS[i % COLS.length];
        const count = data.filter(r => r.Class === cls).length;
        return `
          <div style="padding:11px 0; border-bottom:1px solid #F5F6F8;">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:6px;">
              <div style="display:flex; align-items:center; gap:8px;">
                <span style="width:10px; height:10px; border-radius:50%; background:${col};
                             display:inline-block; flex-shrink:0;"></span>
                <span style="font-size:13px; font-weight:700; color:#191F28;">${cls}</span>
                <span style="font-size:11px; color:#B0B8C1;">${count}건</span>
              </div>
              <div>
                <span style="font-size:14px; font-weight:800; color:#191F28;
                             letter-spacing:-0.5px;">₩${amt.toLocaleString('ko-KR')}</span>
                <span style="font-size:11px; font-weight:600; color:${col};
                             margin-left:6px;">${pct}%</span>
              </div>
            </div>
            <div class="prog-bar">
              <div class="prog-fill" style="width:${barW}%; background:${col};"></div>
            </div>
          </div>`;
      }).join('')
    : '<p style="text-align:center;color:#B0B8C1;padding:20px;">데이터 없음</p>';
}

// ── SubCategory (구매처) section ─────────────────────────
function drawSubSection(data) {
  const subMap = {};
  data.forEach(r => {
    const sub = r.SubCategory || '미분류';
    subMap[sub] = (subMap[sub] || 0) + (Number(r.Amount) || 0);
  });

  const all    = Object.entries(subMap).sort((a, b) => b[1] - a[1]);
  const sorted = all.slice(0, 15);
  const total  = all.reduce((s, [, v]) => s + v, 0);
  const max    = sorted.length ? sorted[0][1] : 1;

  document.getElementById('sub-analysis-bars').innerHTML = sorted.length
    ? sorted.map(([sub, amt]) => {
        const pct   = total > 0 ? ((amt / total) * 100).toFixed(1) : 0;
        const barW  = max   > 0 ? ((amt / max)   * 100).toFixed(0) : 0;
        const count = data.filter(r => (r.SubCategory || '미분류') === sub).length;
        return `
          <div style="padding:10px 0; border-bottom:1px solid #F5F6F8;">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:6px;">
              <div style="display:flex; align-items:center; gap:8px;">
                <span style="font-size:13px; font-weight:700; color:#191F28;">${sub}</span>
                <span style="font-size:11px; color:#B0B8C1;">${count}건</span>
              </div>
              <div>
                <span style="font-size:14px; font-weight:800; color:#191F28;
                             letter-spacing:-0.5px;">₩${amt.toLocaleString('ko-KR')}</span>
                <span style="font-size:11px; font-weight:600; color:#8B95A1;
                             margin-left:6px;">${pct}%</span>
              </div>
            </div>
            <div class="prog-bar">
              <div class="prog-fill" style="width:${barW}%; background:#0064FF; opacity:0.7;"></div>
            </div>
          </div>`;
      }).join('')
    : '<p style="text-align:center;color:#B0B8C1;padding:20px;">데이터 없음</p>';
}

// ── TOP 10 view switcher ─────────────────────────────────
function switchTop10View(view) {
  top10View = view;
  ['all', 'budget', 'nonbudget'].forEach(v => {
    const btn = document.getElementById('top10-chip-' + v);
    if (!btn) return;
    const active = v === view;
    btn.style.background   = active ? '#EBF4FF' : 'white';
    btn.style.color        = active ? '#0064FF' : '#8B95A1';
    btn.style.borderColor  = active ? '#0064FF' : '#E5E8EB';
  });
  renderAnalysis();
}

// ── TOP 10 section ───────────────────────────────────────
function drawTop10Section(data, currentMonth) {
  const [y, mo] = currentMonth.split('-');
  document.getElementById('top10-month-label').innerText = `${y}년 ${parseInt(mo)}월`;

  // 선택 월 필터 → 뷰에 따라 카테고리 필터 추가
  let moData = data.filter(r => r.Date && toLocalDateStr(r.Date).startsWith(currentMonth));
  if (top10View === 'budget')    moData = moData.filter(r => BUDGET_CATEGORIES.has(r.Category));
  if (top10View === 'nonbudget') moData = moData.filter(r => !BUDGET_CATEGORIES.has(r.Category));

  moData = moData
    .sort((a, b) => (Number(b.Amount) || 0) - (Number(a.Amount) || 0))
    .slice(0, 10);

  const medals = ['🥇', '🥈', '🥉'];

  document.getElementById('top10-list').innerHTML = moData.length
    ? moData.map((r, i) => {
        const amt  = Number(r.Amount) || 0;
        const cat  = getCat(r.Category);
        const rank = i < 3
          ? `<span style="font-size:20px; line-height:1;">${medals[i]}</span>`
          : `<span style="font-size:13px; font-weight:800; color:#8B95A1; width:26px;
                          text-align:center; display:inline-block;">${i + 1}</span>`;
        const dateStr = r.Date ? toLocalDateStr(r.Date).substring(5, 10).replace('-', '/') : '';
        return `
          <div style="display:flex; align-items:center; gap:12px; padding:11px 0;
                      border-bottom:1px solid #F5F6F8;">
            <span style="width:26px; text-align:center; flex-shrink:0;">${rank}</span>
            <div class="cat-icon-sm" style="background:${cat.bg}; flex-shrink:0;">${cat.icon}</div>
            <div style="flex:1; min-width:0;">
              <p style="font-size:13px; font-weight:700; color:#191F28; margin-bottom:3px;
                        white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">
                ${r.Item || r.SubCategory || '내용 없음'}
              </p>
              <p style="font-size:11px; color:#8B95A1;">
                ${r.Category || ''} · ${dateStr}${r.SubCategory ? ' · ' + r.SubCategory : ''}
              </p>
            </div>
            <span style="font-size:14px; font-weight:800; color:#191F28;
                         letter-spacing:-0.5px; flex-shrink:0;">₩${amt.toLocaleString('ko-KR')}</span>
          </div>`;
      }).join('')
    : `<div style="text-align:center; padding:32px 0; color:#B0B8C1;">
         <p style="font-size:32px; margin-bottom:8px;">📭</p>
         <p style="font-weight:600; font-size:13px;">${parseInt(mo)}월 해당 데이터 없음</p>
       </div>`;
}

// ── Init ─────────────────────────────────────────────────
loadData();
</script>
